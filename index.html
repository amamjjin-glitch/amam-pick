<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카페 발주 시스템</title>
<style>
  :root{
    --header-h: 0px;
    --paper:#FFFFFF;
    --paper-2:#EEF2F8;
    --ink:#122642;
    --ink-soft:#5B6B85;
    --line:#DCE3EE;
    --line-strong:#B7C4D9;
    --brand:#14335C;
    --brand-soft:#E6ECF6;
    --stamp:#14335C;
    --white:#FFFFFF;

    --c-salad:#3C7A5E;
    --c-salad-bg:#E7F1EA;
    --c-costco:#2F5C8A;
    --c-costco-bg:#E6EDF4;
    --c-payment:#B2622E;
    --c-payment-bg:#F6EAE0;
    --c-cookie:#7A5236;
    --c-cookie-bg:#F0E7DE;
    --c-warehouse:#57564F;
    --c-warehouse-bg:#ECEBE5;
    --c-transfer:#1F7A72;
    --c-transfer-bg:#E2F1EF;
    --c-produce:#B8860B;
    --c-produce-bg:#F7EFD9;
    --c-seoulwarehouse:#8A4F4F;
    --c-seoulwarehouse-bg:#F5E6E6;
  }
  *{box-sizing:border-box;}
  html{ overflow-x:hidden; width:100%; }
  body{
    margin:0;
    width:100%;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  .mono{ font-family: ui-monospace, "SF Mono", Consolas, "Roboto Mono", monospace; }

  #app{ max-width:920px; margin:0 auto; padding:0 0 100px; }

  header.top{
    padding:24px 18px 18px;
    border-bottom:1px solid var(--line);
    background:var(--paper);
    position:sticky; top:0; z-index:20;
  }
  header.top .brandrow{ display:flex; align-items:center; justify-content:center; gap:10px; }
  header.top .logomark{ width:6cm; height:auto; display:block; flex-shrink:0; }
  header.top h1{
    margin:0; font-size:19px; letter-spacing:-0.02em; font-weight:800; color:var(--ink);
  }
  header.top .sub{ font-size:13px; color:var(--ink-soft); margin-top:6px; }

  nav.tabs{
    display:flex; gap:4px; margin-top:18px;
  }
  nav.tabs button{
    flex:1; padding:10px 6px; border:1px solid var(--line);
    background:var(--paper-2); color:var(--ink-soft); font-size:14px; font-weight:700;
    border-radius:8px 8px 0 0; cursor:pointer; border-bottom:none;
    transition:background .15s, color .15s;
  }
  nav.tabs button.active{ background:var(--white); color:var(--brand); border-color:var(--line-strong); }

  main{ padding:22px 18px 0; }

  /* ---- pill selectors ---- */
  .pillrow{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:18px; }
  .pill{
    padding:7px 13px; border-radius:999px; border:1px solid var(--line-strong);
    background:var(--white); font-size:14px; font-weight:600; cursor:pointer; color:var(--ink);
  }
  .pill.active{ background:var(--brand); border-color:var(--brand); color:var(--white); }

  .datebar{ display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:22px; }
  .datebar button.nav{
    width:32px; height:32px; border-radius:6px; border:1px solid var(--line-strong);
    background:var(--white); cursor:pointer; font-size:16px; color:var(--ink-soft);
  }
  .datebar input[type=date], .datebar input[type=month]{
    border:1px solid var(--line-strong); border-radius:6px; padding:6px 10px;
    font-size:14px; font-family:inherit; background:var(--white); color:var(--ink);
  }
  .datebar .label{ font-size:14px; color:var(--ink-soft); }
  .updated-note{ font-size:12px; color:var(--ink-soft); margin:-10px 0 14px; }
  .closed-banner{
    background:#FDECEC; color:#B23B3B; border:1px solid #F3C4C4; border-radius:8px;
    padding:10px 14px; font-size:13px; font-weight:600; margin:-6px 0 14px;
  }
  .pickmeta{ margin-left:auto; display:flex; gap:6px; align-items:center; }
  .pickmeta input{
    border:1px solid var(--line-strong); border-radius:6px; padding:6px 10px;
    font-size:13px; font-family:inherit; background:var(--white); color:var(--ink);
  }
  .pickmeta input[type=text]{ width:100px; }
  .close-btn{
    border:1px solid #B23B3B; border-radius:6px; padding:6px 12px; font-size:13px;
    font-weight:700; font-family:inherit; background:#FDECEC; color:#B23B3B; cursor:pointer;
  }
  .close-btn.is-closed{ background:var(--paper-2); color:var(--ink-soft); border-color:var(--line-strong); }
  .close-badge{ font-size:13px; font-weight:700; color:#B23B3B; }
  .print-btn{
    border:1px solid var(--line-strong); border-radius:6px; padding:6px 12px; font-size:13px;
    font-weight:700; font-family:inherit; background:var(--white); color:var(--ink); cursor:pointer;
  }
  .print-only{ display:none; }
  .print-header{ margin:4px 0 14px; }
  .print-title{ font-size:18px; font-weight:800; }
  .print-sub{ font-size:13px; color:var(--ink-soft); margin-top:4px; }
  .canbox{ display:flex; align-items:center; gap:5px; }
  .canbox input{
    width:56px; text-align:right; border:1px solid var(--line-strong); border-radius:6px;
    padding:5px 6px; font-size:14px; font-family:inherit;
  }
  .canbox .unit-label{ font-size:13px; color:var(--ink-soft); }

  /* category tabs styled as ticket stubs */
  .cattabs{ display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; margin-bottom:18px; }
  .cattab{
    position:relative; flex:0 0 auto; padding:9px 14px 9px 20px; border-radius:6px;
    font-size:14px; font-weight:700; cursor:pointer; border:1px solid transparent;
    white-space:nowrap; opacity:1; transition:filter .15s;
  }
  .cattab::before{
    content:""; position:absolute; left:7px; top:50%; width:6px; height:6px;
    border-radius:50%; background:currentColor; opacity:.35; transform:translateY(-50%);
  }
  .cattab:hover{ filter:brightness(0.96); }

  .card{
    background:var(--white); border:1px solid var(--line); border-radius:10px;
    padding:20px 18px; margin-bottom:20px;
  }
  .cardhead{
    display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px;
    position:sticky; top:var(--header-h, 0px); background:var(--white); z-index:15;
    padding-bottom:6px; box-shadow:0 2px 0 var(--white);
  }
  .cardhead h2{ font-size:15px; margin:0; font-weight:800; }
  .cardhead h2.cat-title-lg{ font-size:21px; }
  .cardhead .subtotal{ font-size:16px; font-weight:800; }

  .item-row{
    display:flex; align-items:center; gap:10px; padding:14px 0;
    border-bottom:1px dashed var(--line);
  }
  .item-row:last-of-type{ border-bottom:none; }
  .item-row .name{ flex:1 1 auto; font-size:15px; font-weight:600; min-width:0; overflow:hidden; text-overflow:ellipsis; }
  .row-top, .row-bottom{ display:contents; }
  .qtybox{ display:flex; align-items:center; gap:4px; }
  .qtybox button{
    width:26px; height:26px; border-radius:6px; border:1px solid var(--line-strong);
    background:var(--paper-2); font-size:15px; cursor:pointer; color:var(--ink);
  }
  .qtybox input{
    width:40px; text-align:center; border:1px solid var(--line-strong); border-radius:6px;
    padding:5px 2px; font-size:14px; font-family:inherit;
  }
  .pricebox{ display:flex; align-items:center; gap:4px; }
  .pricebox input{
    width:104px; text-align:right; border:1px solid var(--line-strong); border-radius:6px;
    padding:5px 6px; font-size:14px; font-family:inherit;
  }
  .pricebox .won{ font-size:13px; color:var(--ink-soft); }
  .unitbox, .destbox{ display:flex; align-items:center; gap:4px; }
  .unitbox input, .destbox input{
    width:104px; text-align:right; border:1px solid var(--line-strong); border-radius:6px;
    padding:5px 6px; font-size:14px; font-family:inherit;
  }
  .transfer-item-input{
    flex:1 1 100px; min-width:0; border:1px solid var(--line-strong); border-radius:6px;
    padding:6px 8px; font-size:14px; font-family:inherit;
  }
  .transfer-dest-block{ margin-bottom:22px; }
  .transfer-dest-block:last-child{ margin-bottom:0; }
  .transfer-dest-head{
    font-size:14px; font-weight:800; color:var(--ink-soft); margin-bottom:10px;
    padding:8px 10px; border-radius:6px;
  }
  .linetotal{ width:84px; text-align:right; font-size:14px; font-weight:700; }
  .rmbtn{ background:none; border:none; color:var(--ink-soft); font-size:16px; cursor:pointer; padding:2px 4px; }
  .rmbtn:hover{ color:var(--stamp); }
  .grouppay-row{
    display:flex; align-items:center; gap:8px; padding:12px 0; flex-wrap:wrap;
    border-bottom:1px dashed var(--line);
  }
  .grouppay-row:last-of-type{ border-bottom:none; }
  .grouppay-row input, .grouppay-row select{
    border:1px solid var(--line-strong); border-radius:6px; padding:7px 9px;
    font-size:14px; font-family:inherit; background:var(--white); color:var(--ink);
  }
  .grouppay-row .gp-name{ flex:1 1 110px; min-width:0; font-weight:600; }
  .grouppay-row .gp-paydate{ flex:0 0 auto; }
  .grouppay-row select.gp-method{ flex:0 0 auto; cursor:pointer; }
  .grouppay-row select.gp-status{ font-weight:700; cursor:pointer; }
  .grouppay-empty{ font-size:14px; color:var(--ink-soft); padding:14px 0; text-align:center; }
  .reorderbox{ display:flex; flex-direction:column; gap:0; }
  .reorderbox button{
    display:flex; align-items:center; justify-content:center;
    width:20px; height:15px; border:none; background:none;
    cursor:pointer; color:var(--ink-soft); padding:0;
  }
  .reorderbox button:hover:not(:disabled){ color:var(--ink); }
  .reorderbox button:disabled{ opacity:0.25; cursor:default; }
  .reorderbox svg{ width:10px; height:10px; display:block; }

  .additem{ display:flex; gap:6px; margin-top:14px; }
  .additem input{
    flex:1; border:1px solid var(--line-strong); border-radius:6px; padding:8px 10px; font-size:14px; font-family:inherit;
  }
  .additem button{
    border:1px solid var(--line-strong); background:#F4F7FC; color:var(--brand);
    border-radius:6px; padding:8px 14px; font-size:14px; font-weight:700; cursor:pointer;
  }

  .empty{ font-size:14px; color:var(--ink-soft); padding:14px 0; text-align:center; }

  .storebar{
    position:fixed; left:0; right:0; bottom:0; background:var(--white); border-top:1px solid var(--line);
    padding:16px 18px; display:flex; justify-content:space-between; align-items:center;
    max-width:920px; margin:0 auto; box-shadow:0 -2px 8px rgba(0,0,0,0.06); z-index:30;
  }
  .storebar-info{ display:flex; flex-direction:column; gap:2px; }
  .storebar .lbl{ font-size:13px; color:var(--ink-soft); }
  .storebar .amt{ font-size:20px; font-weight:800; }
  .save-btn{
    border:none; border-radius:8px; background:var(--brand); color:var(--white);
    font-size:14px; font-weight:700; padding:10px 18px; cursor:pointer; white-space:nowrap;
  }
  .save-btn.saved{ background:var(--paper-2); color:var(--ink-soft); cursor:default; }

  /* daily report */
  .stamp-total{
    border:3px solid var(--stamp); color:var(--stamp); border-radius:8px;
    padding:20px; text-align:center; transform:rotate(-0.6deg); margin-bottom:22px;
    background:rgba(174,58,46,0.03);
  }
  .stamp-total .cap{ font-size:13px; font-weight:800; letter-spacing:.12em; }
  .stamp-total .num{ font-size:31px; font-weight:900; margin-top:4px; }

  table.report{ width:100%; border-collapse:collapse; font-size:14px; }
  table.report th, table.report td{ padding:11px 6px; border-bottom:1px solid var(--line); text-align:right; }
  table.report th:first-child, table.report td:first-child{ text-align:left; }
  table.report thead th{ color:var(--ink-soft); font-weight:700; font-size:13px; border-bottom:2px solid var(--line-strong); }
  table.report tbody tr:last-child td, table.report tfoot td{ font-weight:800; }
  table.report tfoot td{ border-top:2px solid var(--line-strong); border-bottom:none; }

  details.storedetail{ margin-top:8px; }
  details.storedetail summary{ cursor:pointer; font-size:13px; color:var(--brand); font-weight:700; }
  details.storedetail .detailbody{ padding:8px 0 0 4px; font-size:13px; color:var(--ink-soft); }

  .daily-report .stamp-total{ margin-bottom:32px; }
  .daily-report .card{ margin-bottom:32px; }
  .daily-report table.report th, .daily-report table.report td{ padding:17px 8px; }
  .daily-report details.storedetail{ margin-top:14px; margin-bottom:6px; }
  .daily-report .picklist-item{ padding:10px 0; }
  .daily-report .transfer-dest-block{ margin-bottom:28px; }
  .daily-report .transfer-dest-head{ margin-bottom:14px; }
  details.storedetail .detailbody div{ display:flex; justify-content:space-between; padding:2px 0; }

  /* picklist (출고 내역) — 스프레드시트처럼 매장 열이 서로 줄이 맞도록 하나의 그리드로 구성 */
  .picklist-maingrid{
    display:grid; gap:1px; background:var(--line-strong);
    border:1px solid var(--line-strong); border-radius:8px; overflow:hidden;
  }
  .picklist-storehead{
    background:var(--paper-2); color:var(--ink); font-weight:800; font-size:14px;
    padding:13px 8px; text-align:center; word-break:keep-all;
  }
  .picklist-catrow-head{
    grid-column:1 / -1; font-weight:800; font-size:15px; padding:9px 10px 9px 12px;
    background:var(--white); border-left:3px solid currentColor; word-break:keep-all;
  }
  .picklist-cell{
    background:var(--white); font-size:13px; padding:10px 8px; min-height:2.1em;
    display:flex; align-items:center; justify-content:space-between; gap:6px;
  }
  .picklist-cell span{ word-break:keep-all; overflow-wrap:break-word; }
  .picklist-desttag{ font-weight:800; font-size:12px; color:var(--ink-soft); word-break:keep-all; }
  .picklist-subitem{ padding-left:14px; color:var(--ink-soft); word-break:keep-all; }
  .picklist-summary{ display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:16px; margin-top:20px; }
  .picklist-item{ display:flex; justify-content:space-between; gap:8px; font-size:14px; padding:5px 0; border-bottom:1px dashed var(--line); }
  .picklist-item:last-child{ border-bottom:none; }

  /* stats */
  .statrow{ display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed var(--line); font-size:14px; }
  .statrow .lbl{ font-weight:600; }
  .statrow .val{ font-weight:800; }
  .barwrap{ background:var(--paper-2); border-radius:5px; height:8px; margin-top:5px; overflow:hidden; }
  .barfill{ height:100%; border-radius:5px; }

  .toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--white); padding:8px 16px; border-radius:20px;
    font-size:13px; opacity:0; pointer-events:none; transition:opacity .25s; z-index:50;
  }
  .toast.show{ opacity:1; }

  .loading{ text-align:center; color:var(--ink-soft); font-size:14px; padding:30px 0; }

  #lockScreen{
    position:fixed; top:0; left:0; right:0; bottom:0; width:100%; background:var(--paper); z-index:100;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
  }
  #lockScreen .lockcard{
    width:280px; background:var(--white); border:1px solid var(--line);
    border-radius:12px; padding:28px 24px; text-align:center;
  }
  #lockScreen .lockcard h2{ margin:0 0 6px; font-size:16px; font-weight:800; }
  #lockScreen .lockcard p{ margin:0 0 16px; font-size:12px; color:var(--ink-soft); }
  #lockScreen input{
    width:100%; text-align:left; font-size:14px;
    border:1px solid var(--line-strong); border-radius:8px; padding:10px; font-family:inherit;
    margin-bottom:10px;
  }
  #lockScreen button{
    width:100%; border:none; border-radius:8px; background:var(--brand); color:var(--white);
    font-size:14px; font-weight:700; padding:10px; cursor:pointer;
  }
  #lockScreen .err{ color:var(--stamp); font-size:12px; min-height:16px; margin-top:8px; }
  .userbar{ display:flex; align-items:center; justify-content:flex-end; gap:8px; margin-top:8px; }
  .userbar .who{ font-size:12px; color:var(--ink-soft); }
  .userbar button{
    border:1px solid var(--line-strong); background:var(--white); color:var(--ink-soft);
    border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer;
  }

  @media (max-width:480px){
    .item-row{ flex-wrap:wrap; row-gap:6px; }
    .row-top, .row-bottom{ display:flex; align-items:center; width:100%; }
    .row-top{ gap:6px; }
    .row-bottom{ gap:0; }
    .item-row .name{ flex:1 1 auto; margin-bottom:0; }
    .qtybox{ margin-left:auto; }
    .qtybox input{ width:50px; font-size:16px; }
    body.money-hidden .qtybox input{ width:80px; }
    .pricebox, .unitbox, .destbox{ margin-left:6px; }
    .pricebox input, .unitbox input, .destbox input{ width:90px; font-size:16px; }
    .linetotal{ width:auto; min-width:70px; font-size:15px; order:10; margin-left:6px; }
    .item-row .rmbtn.del-item{
      display:inline-block; margin-left:6px; opacity:0.3; color:var(--ink-soft); font-size:14px;
    }
    main{ padding:16px 6px 0; }
    .picklist-storehead{ font-size:11px; padding:8px 3px; }
    .picklist-catrow-head{ font-size:12px; padding:7px 6px 7px 8px; }
    .picklist-cell{ font-size:10px; padding:6px 3px; gap:2px; min-height:1.8em; }
    .picklist-desttag{ font-size:10px; }
    .picklist-subitem{ padding-left:6px; font-size:10px; }
  }

  @page{ size: 215mm 330mm; margin: 6mm; }
  @media print{
    *{ -webkit-print-color-adjust:exact; print-color-adjust:exact; color-adjust:exact; }
    header.top, nav.tabs, .datebar, .print-btn, .toast, #lockScreen{ display:none !important; }
    body{ background:#fff; }
    #app{ max-width:none; padding:0; }
    main{ padding:0; }
    .print-only{ display:block; }

    .print-title{ font-size:20px; }
    .print-sub{ font-size:14px; margin-top:3px; }
    .print-header{ margin:0 0 10px; }

    .card{ padding:6px 8px; margin-bottom:8px; border-radius:0; border-color:#ccc; }
    .cardhead{ position:static; box-shadow:none; margin-bottom:5px; padding-bottom:3px; }
    .cardhead h2{ font-size:15px; }
    .cardhead h2.cat-title-lg{ font-size:17px; }
    .cardhead .subtotal{ font-size:15px; }

    .picklist-maingrid{ border-radius:0; gap:0; background:none; border:4px solid var(--line-strong); border-right:none; }
    .picklist-storehead{ font-size:20px; padding:6px 3px; border-right:4px solid var(--line-strong); }
    .picklist-catrow-head{ font-size:15px; padding:6px 6px; }
    .picklist-cell{
      font-size:17px; padding:7px 5px; gap:3px; min-height:1.4em;
      border-bottom:1px solid var(--line-strong);
      border-right:4px solid var(--line-strong);
    }
    .picklist-cell span:last-child{
      border-left:1px solid var(--line-strong); padding-left:6px;
      min-width:30px; text-align:right; flex-shrink:0;
    }
    .picklist-desttag{ font-size:13px; }
    .picklist-subitem{ padding-left:7px; font-size:13px; }
    .picklist-item{ font-size:16px; padding:5px 0; }
    .picklist-summary{ gap:8px; margin-top:10px; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); }

    .transfer-dest-block{ margin-bottom:8px; }
    .transfer-dest-head{ font-size:14px; padding:4px 6px; margin-bottom:4px; }

    .canbox{ gap:4px; }
    .canbox input{ width:46px; font-size:14px; padding:2px; }
    .canbox .unit-label{ font-size:14px; }
  }
</style>
</head>
<body>
<div id="lockScreen">
  <div class="lockcard">
    <h2>🔒 발주 시스템</h2>
    <p>이메일과 비밀번호를 입력해주세요</p>
    <input type="email" id="loginEmail" placeholder="이메일" autocomplete="username" autofocus>
    <input type="password" id="loginPw" placeholder="비밀번호" autocomplete="current-password">
    <button id="loginSubmit">로그인</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>
<div id="app" style="display:none;">

window.storage = {
  async get(key){
    const snap = await db.collection('kv').doc(key).get();
    if(!snap.exists) throw new Error('not found');
    const data = snap.data();
    return {value: data.value, updatedBy: data.updatedBy||null, updatedAt: data.updatedAt||null};
  },
  async set(key, value){
    await db.collection('kv').doc(key).set({
      value,
      updatedBy: (auth.currentUser && auth.currentUser.email) || null,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  },
  async list(prefix){
    const snap = await db.collection('kv')
      .where(firebase.firestore.FieldPath.documentId(), '>=', prefix)
      .where(firebase.firestore.FieldPath.documentId(), '<', prefix + '')
      .get();
    return {keys: snap.docs.map(d=>d.id)};
  }
};

function canManageClose(){
  return !!(state.user && CLOSE_ADMINS.includes(String(state.user.email||'').trim().toLowerCase()));
}
function canViewMoney(){
  return !!(state.user && MONEY_VIEWERS.includes(String(state.user.email||'').trim().toLowerCase()));

function todayStr(d){ d=d||new Date(); const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; }
function parseDate(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y, m-1, d); }
function fmtWon(n){ return (n||0).toLocaleString('ko-KR'); }
function fmtDateLabel(s){ const d=parseDate(s); const days=['일','월','화','수','목','금','토']; return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`; }
function fmtUpdated(meta){
  if(!meta || !meta.updatedBy) return '';
  const d = meta.updatedAt && meta.updatedAt.toDate ? meta.updatedAt.toDate() : (meta.updatedAt instanceof Date ? meta.updatedAt : null);
  const timeStr = d ? d.toLocaleString('ko-KR', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
  return `최근 수정: ${esc(meta.updatedBy)}${timeStr ? ' · '+timeStr : ''}`;
}
function getMonday(d){ const date=new Date(d); const day=date.getDay(); const diff=date.getDate()-day+(day===0?-6:1); return new Date(date.getFullYear(),date.getMonth(),diff); }
function addDays(d,n){ const nd=new Date(d); nd.setDate(nd.getDate()+n); return nd; }
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(showToast._t); showToast._t=setTimeout(()=>t.classList.remove('show'), 1600);
}

const state = {
  catalog: null,
  user: null,
  tab: 'entry',
  entry: { store: STORES[0], date: todayStr(), cat: 'salad', order: {}, canTransfer: {out:{}, in:{}}, orderMeta: null, dirty: false, cookieAggregate: null, closed: false, groupPay: [] },
  daily: { date: todayStr(), data: null, meta: {author:'', time:'', closed:false}, canTransfer: {out:{}, in:{}}, cookieTransfer: {out:{}, in:{}}, groupPay: {}, loading:false },
  stats: { mode:'week', anchor: todayStr(), store:'all', data: null, loading:false, customStart: todayStr(), customEnd: todayStr() },
};

// ---------- storage helpers ----------
async function loadCatalog(store){
  try{
    const res = await window.storage.get(`catalog:${store}`, true);
    const cat = JSON.parse(res.value);
    let changed = false;
    CAT_KEYS.forEach(k=>{ if(!cat[k]){ cat[k]=[]; changed=true; } });
    if(changed) await window.storage.set(`catalog:${store}`, JSON.stringify(cat), true);
    return cat;
  }catch(e){
    const initial = {};
    CAT_KEYS.forEach(k=> initial[k] = (DEFAULT_CATALOG[k]||[]).map(name=>({name, price:0, unit:''})) );
    await window.storage.set(`catalog:${store}`, JSON.stringify(initial), true);
    return initial;
  }
}
async function saveCatalog(){
  try{ await window.storage.set(`catalog:${state.entry.store}`, JSON.stringify(state.catalog), true); }
  catch(e){ showToast('저장 실패, 다시 시도해주세요'); }
}
async function loadOrder(store, date){
  try{
    const res = await window.storage.get(`order:${store}:${date}`, true);
    return JSON.parse(res.value);
  }catch(e){ return {}; }
}
async function loadOrderMeta(store, date){
  try{
    const res = await window.storage.get(`order:${store}:${date}`);
    return {updatedBy: res.updatedBy, updatedAt: res.updatedAt};
  }catch(e){ return null; }
}
function markDirty(){
  state.entry.dirty = true;
}
window.addEventListener('beforeunload', (e)=>{
  if(state.entry.dirty){ e.preventDefault(); e.returnValue = ''; }
});
window.addEventListener('beforeprint', ()=>{
  const area = document.getElementById('printArea');
  if(!area) return;
  area.style.zoom = '';
  const rect = area.getBoundingClientRect();
  const PX_PER_MM = 96/25.4;
  const usableW = (215-12) * PX_PER_MM;
  const usableH = (330-12) * PX_PER_MM;
  const scale = Math.min(1, usableW/rect.width, usableH/rect.height);
  area.style.zoom = scale < 1 ? String(scale) : '';
});
window.addEventListener('afterprint', ()=>{
  const area = document.getElementById('printArea');
  if(area) area.style.zoom = '';
});
function checkNotClosed(){
  if(state.entry.closed){
    alert('이미 마감이 되었습니다. 발주를 변경하려면 출고내역에서 마감 취소를 눌러주세요.');
    render();
    return false;
  }
  return true;
}
async function saveOrder(store, date, orderObj){
  try{
    await window.storage.set(`order:${store}:${date}`, JSON.stringify(orderObj), true);
    if(store===state.entry.store && date===state.entry.date){
      state.entry.orderMeta = {updatedBy: state.user.email, updatedAt: new Date()};
    }
  }
  catch(e){ showToast('저장 실패, 다시 시도해주세요'); }
}
// ---------- calculations ----------
function catSubtotal(orderCat){
  if(!orderCat) return 0;
  return Object.values(orderCat).reduce((s,it)=> s + (Number(it.qty)||0)*(Number(it.price)||0), 0);
}
function orderTotal(orderObj){
  if(!orderObj) return 0;
  return CAT_KEYS.reduce((s,k)=> s + catSubtotal(orderObj[k]), 0);
}

// ---------- render dispatch ----------
function syncHeaderHeight(){
  const header = document.querySelector('header.top');
  if(header) document.documentElement.style.setProperty('--header-h', header.offsetHeight + 'px');
}
window.addEventListener('resize', syncHeaderHeight);

function render(){
  const main = document.getElementById('main');
  try{
    document.querySelectorAll('nav.tabs button').forEach(b=> b.classList.toggle('active', b.dataset.tab===state.tab));
    if(state.tab==='entry') renderEntry(main);
    else if(state.tab==='daily') renderDaily(main);
    else if(state.tab==='picklist') renderPicklist(main);
    else renderStats(main);
  }catch(err){
    console.error(err);
    main.innerHTML = `<div class="loading" style="color:var(--stamp)">화면을 불러오는 중 오류가 발생했습니다.<br>${esc(err.message)}</div>`;
  }
  syncHeaderHeight();
}

// ---------- ENTRY TAB ----------
async function switchEntryDate(store, date){
  if(state.entry.dirty && !confirm('저장하지 않은 변경사항이 있습니다. 저장하지 않고 이동하시겠습니까?')) return;
  const storeChanged = store !== state.entry.store;
  const dateChanged = date !== state.entry.date;
  state.entry.store = store; state.entry.date = date;
  if(storeChanged){ state.catalog = await loadCatalog(store); }
  if(dateChanged){ state.entry.canTransfer = await loadCanTransfer(date); }
  state.entry.order = await loadOrder(store, date);
  state.entry.orderMeta = await loadOrderMeta(store, date);
  state.entry.dirty = false;
  state.entry.closed = (await loadPickMeta(date)).closed;
  state.entry.cookieAggregate = store==='서소문점' ? await loadCookieAggregate(date) : null;
  state.entry.groupPay = GROUP_PAY_STORES.includes(store) ? await loadGroupPay(store, date) : [];
  render();
}
function digitsOnly(v){ return String(v||'').replace(/[^\d]/g,''); }
function renderEntry(main){
  if(!state.catalog){ main.innerHTML = `<div class="loading">불러오는 중…</div>`; return; }
  const total = orderTotal(state.entry.order);

  const entryCats = CATS.filter(cat=>{
    if((cat.key==='salad' || cat.key==='cookie') && state.entry.store==='제조실점') return false;
    if(cat.key==='seoulwarehouse' && state.entry.store!=='서울점') return false;
    return true;
  });
  const sections = entryCats.map(cat=>{
    const field = catField(cat.key);
    const orderCat = state.entry.order[cat.key] || {};

    if(field==='transfer'){
      const dests = STORES.filter(s=>s!==state.entry.store);

              <button class="qty-dec">−</button>

            </div>
            <button class="rmbtn del-transfer-item" title="삭제">✕</button>
          </div>`).join('');

        return `

      }).join('');
      return `
        <div class="card" id="sec-${cat.key}" data-cat="${cat.key}">
          <div class="cardhead">
            <h2 style="color:${cat.color}">${cat.label}</h2>
          </div>
          ${destBlocks}

    }

    const items = state.catalog[cat.key];
    let itemRows = items.map((it, idx)=>{

        const lt = (Number(rec.qty)||0)*(Number(rec.price)||0);

          <div class="pricebox">
            <input class="price-input" type="text" inputmode="numeric" value="${fmtWon(rec.price||0)}">
            <span class="won">원</span>
          </div>

      }

        const itemLines = storeData.items.length>0
          ? storeData.items.map(([name,qty])=>`<div class="picklist-item"><span class="picklist-subitem">${esc(name)}</span><span class="mono">${qty}</span></div>`).join('')
          : `<div class="empty">발주 없음</div>`;
        return `
          <div class="transfer-dest-block">
            <div class="transfer-dest-head">${esc(s)} (${storeData.total}개)</div>
            ${itemLines}
          </div>`;
      }).join('')}
      <div class="picklist-item" style="font-weight:800; border-top:1px solid var(--line); padding-top:8px; margin-top:4px;">
        <span>총합</span><span class="mono">${state.entry.cookieAggregate.grand}</span>
      </div>
    </div>` : '';

  main.innerHTML = `
    <div class="pillrow" id="storePills">
      ${STORES.map(s=>`<button class="pill ${s===state.entry.store?'active':''}" data-store="${escAttr(s)}">${esc(s)}</button>`).join('')}
    </div>
    <div class="datebar">
      <button class="nav" id="dPrev">‹</button>
      <input type="date" id="dPick" value="${state.entry.date}">
      <button class="nav" id="dNext">›</button>
      <span class="label">${fmtDateLabel(state.entry.date)}</span>
    </div>
    ${state.entry.orderMeta && state.entry.orderMeta.updatedBy ? `<div class="updated-note">${fmtUpdated(state.entry.orderMeta)}</div>` : ''}
    ${state.entry.closed ? `<div class="closed-banner">🔒 이 날짜는 마감되었습니다. 추가 발주가 필요하면 출고내역에서 마감 취소를 눌러주세요.</div>` : ''}
    <div class="cattabs" id="catTabs">
      ${entryCats.map(c=>`<div class="cattab" style="background:${c.bg}; color:${c.color}" data-cat="${c.key}">${c.label}</div>`).join('')}
    </div>
    ${sections}
    ${cookieAggSection}
    ${groupPaySection}
    ${canSection}
    <div class="storebar">
      <div class="storebar-info">
        <span class="lbl">${esc(state.entry.store)} · ${fmtDateLabel(state.entry.date)} 발주 합계</span>
        ${canViewMoney() ? `<span class="amt mono">${fmtWon(total)}원</span>` : ''}
      </div>
      <button id="confirmSaveBtn" class="save-btn ${(!state.entry.dirty||state.entry.closed)?'saved':''}">${state.entry.closed ? '마감됨 🔒' : (state.entry.dirty ? '저장' : '저장됨 ✓')}</button>
    </div>
  `;
  document.getElementById('confirmSaveBtn').onclick = async ()=>{
    if(!state.entry.dirty) return;
    if(!checkNotClosed()) return;
    await saveOrder(state.entry.store, state.entry.date, state.entry.order);
    state.entry.dirty = false;
    showToast('발주가 저장되었습니다');
    render();
  };
  main.querySelectorAll('.entry-can-input').forEach(inp=>{
    inp.onchange = ()=>{
      const dir = inp.dataset.dir, dest = inp.dataset.dest;
      const val = Math.max(0, parseInt(inp.value)||0);
      state.entry.canTransfer = state.entry.canTransfer || {out:{}, in:{}};
      if(!state.entry.canTransfer.out) state.entry.canTransfer.out = {};
      if(!state.entry.canTransfer.in) state.entry.canTransfer.in = {};
      state.entry.canTransfer[dir][dest] = val;
      if(dir==='out'){ state.entry.canTransfer.in[dest] = val; }
      saveCanTransfer(state.entry.date, state.entry.canTransfer);
      render();
    };
  });

  const commitGroupPay = ()=>{
    saveGroupPay(state.entry.store, state.entry.date, state.entry.groupPay);
    markDirty();
  };
  main.querySelectorAll('.grouppay-row').forEach(row=>{
    const idx = Number(row.dataset.idx);
    const g = state.entry.groupPay[idx];
    const nameInput = row.querySelector('.gp-name');
    const amountInput = row.querySelector('.gp-amount');
    const payDateInput = row.querySelector('.gp-paydate');
    const methodSelect = row.querySelector('.gp-method');
    const statusSelect = row.querySelector('.gp-status');
    nameInput.onchange = ()=>{ g.name = nameInput.value.trim(); commitGroupPay(); render(); };
    if(amountInput){
      amountInput.oninput = ()=>{
        const dg = digitsOnly(amountInput.value);
        amountInput.value = dg ? Number(dg).toLocaleString('ko-KR') : '';
      };
      amountInput.onchange = ()=>{
        g.amount = Math.max(0, parseInt(digitsOnly(amountInput.value))||0);
        commitGroupPay();
        render();
      };
    }
    payDateInput.onchange = ()=>{ g.payDate = payDateInput.value; commitGroupPay(); render(); };
    methodSelect.onchange = ()=>{ g.method = methodSelect.value; commitGroupPay(); render(); };
    statusSelect.onchange = ()=>{ g.status = statusSelect.value; commitGroupPay(); render(); };
    row.querySelector('.gp-del').onclick = ()=>{
      if(!confirm('이 단체 결제 항목을 삭제할까요?')) return;
      state.entry.groupPay.splice(idx,1);
      commitGroupPay();
      render();
    };
  });
  const addGroupPayBtn = document.querySelector('.addGroupPayBtn');
  if(addGroupPayBtn) addGroupPayBtn.onclick = ()=>{
    state.entry.groupPay.push({name:'', amount:0, method:'', status:'incomplete', payDate:''});
    commitGroupPay();
    render();
  };

  main.querySelectorAll('#storePills .pill').forEach(b=> b.onclick = ()=> switchEntryDate(b.dataset.store, state.entry.date));
  document.getElementById('dPick').onchange = (e)=> switchEntryDate(state.entry.store, e.target.value);
  document.getElementById('dPrev').onclick = ()=> switchEntryDate(state.entry.store, todayStr(addDays(parseDate(state.entry.date),-1)));
  document.getElementById('dNext').onclick = ()=> switchEntryDate(state.entry.store, todayStr(addDays(parseDate(state.entry.date),1)));
  main.querySelectorAll('#catTabs .cattab').forEach(el=>{
    el.onclick = ()=>{
      const target = document.getElementById(`sec-${el.dataset.cat}`);
      if(target) target.scrollIntoView({behavior:'smooth', block:'start'});
    };
  });

  main.querySelectorAll('.card[data-cat]').forEach(section=>{
    const catKey = section.dataset.cat;
    const field = catField(catKey);

    if(field==='transfer'){
      section.querySelectorAll('.item-row[data-dest]').forEach(row=>{
        const dest = row.dataset.dest;
        const idx = Number(row.dataset.idx);
        const qtyInput = row.querySelector('.qty-input');
        const itemInput = row.querySelector('.transfer-item-input');
        const unitInput = row.querySelector('.unit-input');
        const commit = ()=>{
          if(!checkNotClosed()) return;
          const qty = Math.max(0, parseInt(qtyInput.value)||0);
          const item = itemInput.value.trim();
          const unit = unitInput.value.trim();
          if(!state.entry.order[catKey]) state.entry.order[catKey] = {};
          if(!state.entry.order[catKey][dest]) state.entry.order[catKey][dest] = [];
          state.entry.order[catKey][dest][idx] = {item, qty, unit};
          markDirty();
          render();
        };
        row.querySelector('.qty-inc').onclick = ()=>{ qtyInput.value = (parseInt(qtyInput.value)||0)+1; commit(); };
        row.querySelector('.qty-dec').onclick = ()=>{ qtyInput.value = Math.max(0,(parseInt(qtyInput.value)||0)-1); commit(); };
        qtyInput.onchange = commit;
        itemInput.onchange = commit;
        unitInput.onchange = commit;
        row.querySelector('.del-transfer-item').onclick = ()=>{
          if(!checkNotClosed()) return;
          state.entry.order[catKey][dest].splice(idx,1);
          markDirty();
          render();
        };
      });
      section.querySelectorAll('.addTransferItemBtn').forEach(btn=>{
        btn.onclick = ()=>{
          if(!checkNotClosed()) return;
          const dest = btn.dataset.dest;
          if(!state.entry.order[catKey]) state.entry.order[catKey] = {};
          if(!state.entry.order[catKey][dest]) state.entry.order[catKey][dest] = [];
          state.entry.order[catKey][dest].push({item:'', qty:0, unit:''});
          markDirty();
          render();
        };
      });
      return;
    }

    section.querySelectorAll('.item-row').forEach(row=>{
      const name = row.dataset.item;
      const qtyInput = row.querySelector('.qty-input');
      const priceInput = row.querySelector('.price-input');
      const unitInput = row.querySelector('.unit-input');
      const commit = async ()=>{
        if(!checkNotClosed()) return;
        const qty = Math.max(0, parseInt(qtyInput.value)||0);
        if(!state.entry.order[catKey]) state.entry.order[catKey] = {};
        if(field==='unit'){
          const unit = unitInput.value.trim();
          if(qty>0 || unit){ state.entry.order[catKey][name] = {qty, unit}; }
          else { delete state.entry.order[catKey][name]; }
          const catItem = state.catalog[catKey].find(x=>x.name===name);
          if(catItem && catItem.unit !== unit){ catItem.unit = unit; await saveCatalog(); }
        } else if(field==='unitprice'){
          const unit = unitInput.value.trim();
          const existingPrice = (state.entry.order[catKey][name]||{}).price ?? (state.catalog[catKey].find(x=>x.name===name)||{}).price ?? 0;
          let price = priceInput ? Math.max(0, parseInt(digitsOnly(priceInput.value))||0) : existingPrice;
          if(priceInput && price !== existingPrice){
            if(!confirm('가격을 변경하시겠습니까?')){ price = existingPrice; priceInput.value = fmtWon(existingPrice); }
          }
          if(qty>0 || unit || price>0){ state.entry.order[catKey][name] = {qty, unit, price}; }
          else { delete state.entry.order[catKey][name]; }
          const catItem = state.catalog[catKey].find(x=>x.name===name);
          if(catItem && (catItem.price !== price || catItem.unit !== unit)){
            catItem.price = price; catItem.unit = unit; await saveCatalog();
          }
        } else {
          const existingPrice = (state.entry.order[catKey][name]||{}).price ?? (state.catalog[catKey].find(x=>x.name===name)||{}).price ?? 0;
          let price = priceInput ? Math.max(0, parseInt(digitsOnly(priceInput.value))||0) : existingPrice;
          if(priceInput && price !== existingPrice){
            if(!confirm('가격을 변경하시겠습니까?')){ price = existingPrice; priceInput.value = fmtWon(existingPrice); }
          }
          if(qty>0){ state.entry.order[catKey][name] = {qty, price}; }
          else { delete state.entry.order[catKey][name]; }
          const catItem = state.catalog[catKey].find(x=>x.name===name);
          if(catItem && catItem.price !== price){ catItem.price = price; await saveCatalog(); }
        }
        markDirty();
        render();
      };
      row.querySelector('.qty-inc').onclick = ()=>{ qtyInput.value = (parseInt(qtyInput.value)||0)+1; commit(); };
      row.querySelector('.qty-dec').onclick = ()=>{ qtyInput.value = Math.max(0,(parseInt(qtyInput.value)||0)-1); commit(); };
      qtyInput.onchange = commit;
      if(priceInput){
        priceInput.oninput = ()=>{
          const d = digitsOnly(priceInput.value);
          priceInput.value = d ? Number(d).toLocaleString('ko-KR') : '';
        };
        priceInput.onchange = commit;
      }
      if(unitInput) unitInput.onchange = commit;
      row.querySelector('.del-item').onclick = async ()=>{
        if(!confirm(`'${name}' 품목을 목록에서 삭제할까요?`)) return;
        if(!checkNotClosed()) return;
        state.catalog[catKey] = state.catalog[catKey].filter(x=>x.name!==name);
        await saveCatalog();
        if(state.entry.order[catKey]) delete state.entry.order[catKey][name];
        markDirty();
        render();
      };
      const idx = Number(row.dataset.idx);
      const moveUpBtn = row.querySelector('.move-up');
      const moveDownBtn = row.querySelector('.move-down');
      if(moveUpBtn) moveUpBtn.onclick = async ()=>{
        if(idx<=0) return;
        const list = state.catalog[catKey];
        [list[idx-1], list[idx]] = [list[idx], list[idx-1]];
        await saveCatalog();
        render();
      };
      if(moveDownBtn) moveDownBtn.onclick = async ()=>{
        const list = state.catalog[catKey];
        if(idx>=list.length-1) return;
        [list[idx+1], list[idx]] = [list[idx], list[idx+1]];
        await saveCatalog();
        render();
      };
    });

    section.querySelector('.addItemBtn').onclick = async ()=>{
      const input = section.querySelector('.newItemName');
      const name = input.value.trim();
      if(!name) return;
      if(state.catalog[catKey].some(x=>x.name===name)){ showToast('이미 있는 품목이에요'); return; }
      state.catalog[catKey].push({name, price:0, unit:''});
      await saveCatalog();
      showToast(`'${name}' 품목이 추가되었습니다`);
      render();
    };
  });
}

// ---------- DAILY REPORT TAB ----------
async function loadPickMeta(date){
  try{ const res = await window.storage.get(`picklist_meta:${date}`, true); const meta = JSON.parse(res.value); meta.closed = !!meta.closed; return meta; }
  catch(e){ return {author:'', time:'', closed:false}; }
}
async function savePickMeta(date, meta){
  try{ await window.storage.set(`picklist_meta:${date}`, JSON.stringify(meta), true); }catch(e){}
}
const GROUP_PAY_STORES = STORES.filter(s=> s!=='문래점' && s!=='제조실점');
async function loadGroupPay(store, date){
  try{
    const res = await window.storage.get(`grouppay:${store}:${date}`, true);
    return JSON.parse(res.value);
  }catch(e){ return []; }
}
async function saveGroupPay(store, date, list){
  try{ await window.storage.set(`grouppay:${store}:${date}`, JSON.stringify(list), true); }catch(e){}
}
function groupPayTotal(list){
  return (list||[]).reduce((sum,g)=> sum + (g.status==='complete' ? (Number(g.amount)||0) : 0), 0);
}
const GROUP_PAY_METHODS = ['카드리더기','세금계산서','계좌이체','매장결제'];
const CAN_DESTS = ['광화문점','서소문점','제조실점'];
async function loadCanTransfer(date){
  try{
    const res = await window.storage.get(`can_transfer:${date}`, true);
    return JSON.parse(res.value);
  }catch(e){ return {out:{}, in:{}}; }
}
async function saveCanTransfer(date, val){
  try{ await window.storage.set(`can_transfer:${date}`, JSON.stringify(val), true); }catch(e){}
}
const COOKIE_DESTS = ['서울점','광화문점','문래점'];
async function loadCookieTransfer(date){
  try{
    const res = await window.storage.get(`cookie_transfer:${date}`, true);
    return JSON.parse(res.value);
  }catch(e){ return {out:{}, in:{}}; }
}
async function saveCookieTransfer(date, val){
  try{ await window.storage.set(`cookie_transfer:${date}`, JSON.stringify(val), true); }catch(e){}
}
async function loadCookieAggregate(date){
  const perStore = {};
  await Promise.all(STORES.filter(s=>s!=='제조실점').map(async s=>{
    const order = await loadOrder(s, date);
    const cookieItems = order['cookie'] || {};
    const items = Object.entries(cookieItems)
      .filter(([,rec])=>(rec.qty||0)>0)
      .map(([name,rec])=>[name, Number(rec.qty)||0]);
    const total = items.reduce((sum,[,qty])=>sum+qty, 0);
    perStore[s] = {items, total};
  }));
  const grand = Object.values(perStore).reduce((sum,s)=>sum+s.total, 0);
  return {perStore, grand};
}
async function loadDailyData(date){
  state.daily.loading = true; render();
  const results = {};
  await Promise.all(visibleStores().map(async s=>{
    results[s] = await loadOrder(s, date);
  }));
  state.daily.data = results;
  state.daily.meta = await loadPickMeta(date);
  state.daily.canTransfer = await loadCanTransfer(date);
  state.daily.cookieTransfer = await loadCookieTransfer(date);
  const gpStores = GROUP_PAY_STORES.filter(s=> visibleStores().includes(s));
  const groupPay = {};
  await Promise.all(gpStores.map(async s=>{ groupPay[s] = await loadGroupPay(s, date); }));
  state.daily.groupPay = groupPay;
  state.daily.loading = false;
  render();
}
function renderDaily(main){
  if(state.daily.data===null && !state.daily.loading){ loadDailyData(state.daily.date); }
  main.innerHTML = `
    <div class="datebar">
      <button class="nav" id="dPrev">‹</button>
      <input type="date" id="dPick" value="${state.daily.date}">
      <button class="nav" id="dNext">›</button>
      <span class="label">${fmtDateLabel(state.daily.date)}</span>
    </div>
    <div id="dailyBody"></div>
  `;
  document.getElementById('dPick').onchange = (e)=>{ state.daily.date=e.target.value; state.daily.data=null; render(); };
  document.getElementById('dPrev').onclick = ()=>{ state.daily.date=todayStr(addDays(parseDate(state.daily.date),-1)); state.daily.data=null; render(); };
  document.getElementById('dNext').onclick = ()=>{ state.daily.date=todayStr(addDays(parseDate(state.daily.date),1)); state.daily.data=null; render(); };

  const body = document.getElementById('dailyBody');
  if(state.daily.loading || state.daily.data===null){
    body.innerHTML = `<div class="loading">집계 중…</div>`;
    return;
  }
  const data = state.daily.data;
  const dailyStores = visibleStores();
  let grand = 0;
  const catTotals = {}; MONEY_CAT_KEYS.forEach(k=>catTotals[k]=0);
  const storeTotals = {};
  dailyStores.forEach(s=>{
    let st=0;
    MONEY_CAT_KEYS.forEach(k=>{ const v=catSubtotal(data[s][k]); catTotals[k]+=v; st+=v; });
    storeTotals[s]=st; grand+=st;
  });

  const rows = dailyStores.map(s=>`
    <tr>
      <td>${esc(s)}</td>
      ${MONEY_CAT_KEYS.map(k=>`<td class="mono">${fmtWon(catSubtotal(data[s][k]))}</td>`).join('')}
      <td class="mono">${fmtWon(storeTotals[s])}</td>
    </tr>
    <tr><td colspan="${MONEY_CAT_KEYS.length+2}" style="border-bottom:1px solid var(--line); padding:0;">
      <details class="storedetail"><summary>${esc(s)} 상세 보기</summary>
      <div class="detailbody">${detailLines(data[s])}</div></details>
    </td></tr>
  `).join('');

  const gpStores = Object.keys(state.daily.groupPay||{});
  const groupPayGrand = gpStores.reduce((sum,s)=> sum + groupPayTotal(state.daily.groupPay[s]), 0);
  const groupPaySection = gpStores.length>0 ? `
    <div class="card">
      <div class="cardhead"><h2>단체 결제 합계</h2><div class="subtotal mono">${fmtWon(groupPayGrand)}원</div></div>
      ${gpStores.map(s=>{
        const list = state.daily.groupPay[s]||[];
        if(list.length===0) return '';
        return `
        <div class="transfer-dest-block">
          <div class="transfer-dest-head">${esc(s)} (${fmtWon(groupPayTotal(list))}원)</div>
          ${list.map(g=>`
            <div class="picklist-item">
              <span>${esc(g.name||'(이름 없음)')} ${g.method?`· ${esc(g.method)}`:''} ${g.payDate?`· ${esc(fmtDateLabel(g.payDate))}`:''} <span style="color:${g.status==='complete'?'#2E7D46':'#B23B3B'}; font-weight:700;">[${g.status==='complete'?'완결':'미결'}]</span></span>
              <span class="mono">${fmtWon(g.amount||0)}원</span>
            </div>`).join('')}
        </div>`;
      }).join('')}
    </div>` : '';

  body.innerHTML = `
    <div class="daily-report">
      <div class="stamp-total">
        <div class="cap">${fmtDateLabel(state.daily.date)} · ${state.user.role==='manager' ? esc(state.user.store)+' 발주액' : '전 매장 총 발주액'}</div>
        <div class="num mono">${fmtWon(grand)}원</div>
      </div>
      <div class="card">
        <table class="report">
          <thead><tr><th>매장</th>${MONEY_CATS.map(c=>`<th>${c.label.replace(' 발주','').replace('요청','')}</th>`).join('')}<th>합계</th></tr></thead>
          <tbody>${rows}</tbody>
          <tfoot><tr><td>전체</td>${MONEY_CAT_KEYS.map(k=>`<td class="mono">${fmtWon(catTotals[k])}</td>`).join('')}<td class="mono">${fmtWon(grand)}</td></tr></tfoot>
        </table>
      </div>
      ${groupPaySection}
    </div>
  `;
}
function detailLines(storeOrder){
  let out = '';
  MONEY_CATS.forEach(c=>{
    const cat = storeOrder[c.key];
    if(!cat) return;
    const field = catField(c.key);
    Object.entries(cat).forEach(([key, rec])=>{
      if((rec.qty||0)<=0) return;
      const unitPart = (field==='unitprice' && rec.unit) ? esc(rec.unit) : '';
      out += `<div style="border-left:3px solid ${c.color}; padding-left:8px; margin-bottom:2px;">
        <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${c.color};margin-right:6px;"></span><span style="color:${c.color};font-weight:700;">${esc(c.label)}</span> · ${esc(key)} × ${rec.qty}${unitPart? ' '+unitPart : ''}</span>
        <span>${fmtWon(rec.qty*rec.price)}원</span>
      </div>`;
    });
  });
  return out || '<div>발주 내역 없음</div>';
}

// ---------- PICKLIST (출고 내역) TAB ----------
function renderPicklist(main){

    <div class="datebar">
      <button class="nav" id="dPrev">‹</button>
      <input type="date" id="dPick" value="${state.daily.date}">

          ? `<button id="closeToggleBtn" class="close-btn ${meta.closed?'is-closed':''}">${meta.closed ? '마감 취소' : '마감'}</button>`

      </div>
      <div id="picklistBody"></div>
    </div>
  `;
  document.getElementById('printBtn').onclick = ()=> window.print();
  document.getElementById('dPick').onchange = (e)=>{ state.daily.date=e.target.value; state.daily.data=null; render(); };
  document.getElementById('dPrev').onclick = ()=>{ state.daily.date=todayStr(addDays(parseDate(state.daily.date),-1)); state.daily.data=null; render(); };
  document.getElementById('dNext').onclick = ()=>{ state.daily.date=todayStr(addDays(parseDate(state.daily.date),1)); state.daily.data=null; render(); };
  document.getElementById('pickAuthor').onchange = (e)=>{
    state.daily.meta = state.daily.meta || {author:'', time:'', closed:false};
    state.daily.meta.author = e.target.value;
    savePickMeta(state.daily.date, state.daily.meta);
  };
  document.getElementById('pickTime').onchange = (e)=>{
    state.daily.meta = state.daily.meta || {author:'', time:'', closed:false};
    state.daily.meta.time = e.target.value;
    savePickMeta(state.daily.date, state.daily.meta);
  };
  const closeToggleBtn = document.getElementById('closeToggleBtn');
  if(closeToggleBtn) closeToggleBtn.onclick = async ()=>{
    if(!canManageClose()) return;
    state.daily.meta = state.daily.meta || {author:'', time:'', closed:false};
    const willClose = !state.daily.meta.closed;
    if(willClose && !confirm(`${fmtDateLabel(state.daily.date)} 발주를 마감할까요? 마감 후에는 발주 입력에서 추가 발주가 불가능합니다.`)) return;
    if(!willClose && !confirm(`${fmtDateLabel(state.daily.date)} 마감을 취소할까요? 취소하면 다시 발주를 추가/변경할 수 있습니다.`)) return;
    state.daily.meta.closed = willClose;
    await savePickMeta(state.daily.date, state.daily.meta);
    if(state.daily.date === state.entry.date) state.entry.closed = willClose;
    render();
  };

  const body = document.getElementById('picklistBody');
  if(state.daily.loading || state.daily.data===null){
    body.innerHTML = `<div class="loading">집계 중…</div>`;
    return;
  }
  const data = state.daily.data;

  // 매장 x 카테고리별로 한 줄씩(품목/수량 또는 특수요약) 라인을 만든다.
  // 같은 카테고리에서는 매장마다 줄 수가 다를 수 있으므로, 가장 줄이 많은 매장 기준으로
  // 나머지 매장은 빈 칸을 채워서 스프레드시트처럼 행이 서로 맞춰지게 한다.
  function picklistLines(s, cat){
    const field = catField(cat.key);
    if(cat.key==='salad' && s==='제조실점'){
      const itemTotals = {};
      (PICKLIST_PINNED.salad||[]).forEach(name=>{ itemTotals[name] = 0; });
      STORES.filter(x=>x!=='제조실점').forEach(x=>{
        const saladItems = (data[x] && data[x]['salad']) || {};
        Object.entries(saladItems).forEach(([name,rec])=>{
          itemTotals[name] = (itemTotals[name]||0) + (Number(rec.qty)||0);
        });
      });
      const lines = Object.entries(itemTotals).map(([name,qty])=>
        `<span>${esc(name)}</span><span class="mono">${qty}</span>`);
      const grandTotal = Object.values(itemTotals).reduce((sum,q)=>sum+q, 0);
      lines.push(`<span>총합</span><span class="mono">${grandTotal}</span>`);
      return lines;
    }
    const items = Object.entries(data[s][cat.key]||{});
    if(cat.key==='cookie' && s!=='제조실점'){
      const total = items.reduce((sum,[,rec])=>sum+(Number(rec.qty)||0), 0);
      return [`<span>총 수량</span><span class="mono">${total}</span>`];
    }
    const pinned = s!=='제조실점' ? PICKLIST_PINNED[cat.key] : null;
    if(pinned){
      const itemMap = Object.fromEntries(items);
      const lines = pinned.map(name=>{
        const rec = itemMap[name] || {};
        let val = String(rec.qty||0);
        if((field==='unit'||field==='unitprice') && rec.unit) val += ' '+esc(rec.unit);
        return `<span>${esc(name)}</span><span class="mono">${val}</span>`;
      });
      items.filter(([name,rec])=>!pinned.includes(name) && (rec.qty||0)>0).forEach(([name,rec])=>{
        let val = String(rec.qty);
        if((field==='unit'||field==='unitprice') && rec.unit) val += ' '+esc(rec.unit);
        lines.push(`<span>${esc(name)}</span><span class="mono">${val}</span>`);
      });
      return lines;
    }
    return items.filter(([,rec])=>(rec.qty||0)>0).map(([name,rec])=>{
      let val = String(rec.qty);
      if((field==='unit'||field==='unitprice') && rec.unit) val += ' '+esc(rec.unit);
      return `<span>${esc(name)}</span><span class="mono">${val}</span>`;
    });
  }

  // 매장 이동 — 출고와 입고를 별도 줄 그룹으로 나눠서, 각자 자기 내용 기준으로만 줄 수가 맞춰지게 한다.
  function transferOutLines(s, catKey){
    const outEntries = Object.entries(data[s][catKey]||{})
      .map(([dest, arr])=>[dest, (arr||[]).filter(rec=>(rec.qty||0)>0)])
      .filter(([,items])=>items.length>0);
    const lines = [];
    outEntries.forEach(([dest, items])=>{
      lines.push(`<span class="picklist-desttag">→ ${esc(dest)}</span><span></span>`);
      items.forEach(rec=>{
        const val = String(rec.qty) + (rec.unit ? ' '+esc(rec.unit) : '');
        lines.push(`<span class="picklist-subitem">${esc(rec.item||'(품목 미입력)')}</span><span class="mono">${val}</span>`);
      });
    });
    return lines;
  }
  function transferInLines(s, catKey){
    const inEntries = STORES.filter(origin=>origin!==s)
      .map(origin=>[origin, ((data[origin] && data[origin][catKey] && data[origin][catKey][s]) || []).filter(rec=>(rec.qty||0)>0)])
      .filter(([,items])=>items.length>0);
    const lines = [];
    inEntries.forEach(([origin, items])=>{
      lines.push(`<span class="picklist-desttag">← ${esc(origin)}</span><span></span>`);
      items.forEach(rec=>{
        const val = String(rec.qty) + (rec.unit ? ' '+esc(rec.unit) : '');
        lines.push(`<span class="picklist-subitem">${esc(rec.item||'(품목 미입력)')}</span><span class="mono">${val}</span>`);
      });
    });
    return lines;
  }

  // 문래점·제조실점은 일반 매장(서울/서소문/광화문)과 구분되게 옅은 색을 입힌다.
  const specialBg = s => (s==='문래점' || s==='제조실점') ? PICKLIST_STORE_BG[s] : null;

  const gridCells = [];
  STORES.forEach(s=>{
    const bg = specialBg(s);
    gridCells.push(`<div class="picklist-storehead"${bg?` style="background:${bg}"`:''}>${esc(s)}</div>`);
  });
  PICKLIST_CATS.forEach(cat=>{
    if(catField(cat.key)==='transfer'){
      // 출고와 입고를 서로 독립된 줄 그룹으로 나눠서 렌더링 — 한쪽 매장의 출고가 많아도
      // 다른 매장의 입고 위치가 밀리지 않고, 입고는 입고끼리 같은 줄에서 시작한다.
      gridCells.push(`<div class="picklist-catrow-head" style="background:${PICKLIST_CAT_BG[cat.key]||cat.bg}; color:${cat.color}">${esc(cat.label)} [출고]</div>`);
      const outPerStore = STORES.map(s=> transferOutLines(s, cat.key));
      const outMax = Math.max(1, ...outPerStore.map(l=>l.length));
      for(let i=0;i<outMax;i++){
        STORES.forEach((s, idx)=>{
          const bg = specialBg(s);
          gridCells.push(`<div class="picklist-cell"${bg?` style="background:${bg}"`:''}>${outPerStore[idx][i] || ''}</div>`);
        });
      }
      gridCells.push(`<div class="picklist-catrow-head" style="background:${PICKLIST_CAT_BG[cat.key]||cat.bg}; color:${cat.color}">${esc(cat.label)} [입고]</div>`);
      const inPerStore = STORES.map(s=> transferInLines(s, cat.key));
      const inMax = Math.max(1, ...inPerStore.map(l=>l.length));
      for(let i=0;i<inMax;i++){
        STORES.forEach((s, idx)=>{
          const bg = specialBg(s);
          gridCells.push(`<div class="picklist-cell"${bg?` style="background:${bg}"`:''}>${inPerStore[idx][i] || ''}</div>`);
        });
      }
      return;
    }
    gridCells.push(`<div class="picklist-catrow-head" style="background:${PICKLIST_CAT_BG[cat.key]||cat.bg}; color:${cat.color}">${esc(cat.label)}</div>`);
    const perStore = STORES.map(s=> picklistLines(s, cat));
    const maxLines = Math.max(1, ...perStore.map(l=>l.length));
    for(let i=0;i<maxLines;i++){
      STORES.forEach((s, idx)=>{
        const bg = specialBg(s);
        gridCells.push(`<div class="picklist-cell"${bg?` style="background:${bg}"`:''}>${perStore[idx][i] || ''}</div>`);
      });
    }
  });

  // 전 지점 합계 카드 (코스트코 발주 / 청과)
  function categoryTotals(catKey){
    const totals = {};
    STORES.forEach(s=>{
      const catItems = (data[s] && data[s][catKey]) || {};
      Object.entries(catItems).forEach(([name,rec])=>{
        totals[name] = (totals[name]||0) + (Number(rec.qty)||0);
      });
    });
    return totals;
  }
  const summaryCard = (catKey, label)=>{
    const cat = CATS.find(c=>c.key===catKey);
    const totals = Object.entries(categoryTotals(catKey)).filter(([,qty])=>qty>0);
    return `
      <div class="card">
        <div class="cardhead"><h2 style="color:${cat.color}">${esc(label)}</h2></div>
        ${totals.length>0
          ? totals.map(([name,qty])=>`<div class="picklist-item"><span>${esc(name)}</span><span class="mono">${qty}</span></div>`).join('')
          : `<div class="empty">발주 내역 없음</div>`}
      </div>`;
  };

  const canTransfer = state.daily.canTransfer || {out:{}, in:{}};
  const canCard = (dir, label)=>{
    const vals = canTransfer[dir] || {};
    return `
      <div class="card">
        <div class="cardhead"><h2>${esc(label)}</h2></div>
        ${CAN_DESTS.map(dest=>`
          <div class="picklist-item">
            <span>${esc(dest)}</span>
            <span class="canbox">
              <input type="number" min="0" class="can-input" data-dir="${dir}" data-dest="${escAttr(dest)}" value="${vals[dest]||0}">
              <span class="unit-label">박스</span>
            </span>
          </div>`).join('')}
      </div>`;
  };

  const cookieTransfer = state.daily.cookieTransfer || {out:{}, in:{}};
  const cookieTransferCard = (dir, label)=>{
    const vals = cookieTransfer[dir] || {};
    return `
    <div class="card">
      <div class="cardhead"><h2>${esc(label)}</h2></div>
      ${COOKIE_DESTS.map(dest=>`
        <div class="picklist-item">
          <span>${esc(dest)}</span>
          <span class="canbox">
            <input type="number" min="0" class="cookie-transfer-input" data-dir="${dir}" data-dest="${escAttr(dest)}" value="${vals[dest]||0}">
            <span class="unit-label">개</span>
          </span>
        </div>`).join('')}
    </div>`;
  };

  // 서울 창고 결제요청 / 제조실 결제요청 — 지점별로 나누지 않고 해당 매장 데이터만 하나의 카드로 표시
  const storeCategoryCard = (storeKey, catKey, label)=>{
    const cat = CATS.find(c=>c.key===catKey);
    const items = Object.entries((data[storeKey] && data[storeKey][catKey]) || {}).filter(([,rec])=>(rec.qty||0)>0);
    return `
      <div class="card">
        <div class="cardhead"><h2 style="color:${cat.color}">${esc(label)}</h2></div>
        ${items.length>0
          ? items.map(([name,rec])=>{
              let val = String(rec.qty);
              if(rec.unit) val += ' '+esc(rec.unit);
              return `<div class="picklist-item"><span>${esc(name)}</span><span class="mono">${val}</span></div>`;
            }).join('')
          : `<div class="empty">발주 내역 없음</div>`}
      </div>`;
  };

  body.innerHTML = `
    <div class="picklist-maingrid" style="grid-template-columns:repeat(${STORES.length}, 1fr)">${gridCells.join('')}</div>
    ${storeCategoryCard('서울점', 'seoulwarehouse', '서울 창고 결제요청')}
    ${storeCategoryCard('제조실점', 'payment', '제조실 결제요청')}
    <div class="picklist-summary">
      ${summaryCard('costco', '코스트코 발주 합계')}
      ${summaryCard('produce', '청과 발주 합계')}
    </div>
    <div class="picklist-summary">
      ${canCard('out', '캔 출고 (서울점 출고)')}
      ${canCard('in', '캔 입고 (광화문·서소문·제조실 입고)')}
    </div>
    <div class="picklist-summary">
      ${cookieTransferCard('out', '쿠키 출고 (서소문점 출고)')}
      ${cookieTransferCard('in', '쿠키 입고 (서울·광화문·문래 입고)')}
    </div>
  `;
  body.querySelectorAll('.cookie-transfer-input').forEach(inp=>{
    inp.onchange = ()=>{
      const dir = inp.dataset.dir, dest = inp.dataset.dest;
      const val = Math.max(0, parseInt(inp.value)||0);
      state.daily.cookieTransfer = state.daily.cookieTransfer || {out:{}, in:{}};
      if(!state.daily.cookieTransfer.out) state.daily.cookieTransfer.out = {};
      if(!state.daily.cookieTransfer.in) state.daily.cookieTransfer.in = {};
      state.daily.cookieTransfer[dir][dest] = val;
      if(dir==='out'){ state.daily.cookieTransfer.in[dest] = val; }
      saveCookieTransfer(state.daily.date, state.daily.cookieTransfer);
      render();
    };
  });
  body.querySelectorAll('.can-input').forEach(inp=>{
    inp.onchange = ()=>{
      const dir = inp.dataset.dir, dest = inp.dataset.dest;
      const val = Math.max(0, parseInt(inp.value)||0);
      state.daily.canTransfer = state.daily.canTransfer || {out:{}, in:{}};
      if(!state.daily.canTransfer.out) state.daily.canTransfer.out = {};
      if(!state.daily.canTransfer.in) state.daily.canTransfer.in = {};
      state.daily.canTransfer[dir][dest] = val;
      if(dir==='out'){ state.daily.canTransfer.in[dest] = val; }
      saveCanTransfer(state.daily.date, state.daily.canTransfer);
      render();
    };
  });
}

// ---------- STATS TAB ----------
function statsRange(){
  if(state.stats.mode==='custom'){
    const start = parseDate(state.stats.customStart);
    const end = parseDate(state.stats.customEnd);
    const dates = [];
    if(end >= start){
      for(let d=new Date(start); d<=end; d=addDays(d,1)) dates.push(todayStr(d));
    }
    return {dates, label: dates.length ? `${fmtDateLabel(dates[0])}~${fmtDateLabel(dates[dates.length-1])}` : '기간을 확인해주세요'};
  }
  const anchor = parseDate(state.stats.anchor);
  if(state.stats.mode==='week'){
    const mon = getMonday(anchor);
    const dates = []; for(let i=0;i<7;i++) dates.push(todayStr(addDays(mon,i)));
    return {dates, label:`${fmtDateLabel(dates[0]).split(' ')[0]}~${fmtDateLabel(dates[6])}`};
  } else {
    const y=anchor.getFullYear(), m=anchor.getMonth();
    const first = new Date(y,m,1), last = new Date(y,m+1,0);
    const dates=[]; for(let d=1; d<=last.getDate(); d++) dates.push(todayStr(new Date(y,m,d)));
    return {dates, label:`${y}년 ${m+1}월`};
  }
}
async function loadStatsData(){
  state.stats.loading = true; render();
  const {dates} = statsRange();
  const storesToLoad = state.user.role==='manager' ? [state.user.store] : (state.stats.store==='all' ? STORES : [state.stats.store]);
  let listRes;
  try{ listRes = await window.storage.list('order:', true); }catch(e){ listRes = {keys:[]}; }
  const existingKeys = new Set((listRes && listRes.keys) || []);
  const wanted = [];
  storesToLoad.forEach(s=> dates.forEach(d=>{
    const k = `order:${s}:${d}`;
    if(existingKeys.has(k)) wanted.push({k, s, d});
  }));
  const dataByDate = {}; dates.forEach(d=>dataByDate[d]={});
  const catTotals={}; CAT_KEYS.forEach(k=>catTotals[k]=0);
  const storeTotals={}; storesToLoad.forEach(s=>storeTotals[s]=0);
  let grand=0;
  await Promise.all(wanted.map(async ({k,s,d})=>{
    try{
      const res = await window.storage.get(k, true);
      const order = JSON.parse(res.value);
      const t = orderTotal(order);
      dataByDate[d][s] = t;
      CAT_KEYS.forEach(ck=>{ catTotals[ck]+=catSubtotal(order[ck]); });
      storeTotals[s]+=t; grand+=t;
    }catch(e){}
  }));

  const gpStoresToLoad = storesToLoad.filter(s=> GROUP_PAY_STORES.includes(s));
  let listResGp;
  try{ listResGp = await window.storage.list('grouppay:', true); }catch(e){ listResGp = {keys:[]}; }
  const gpExistingKeys = new Set((listResGp && listResGp.keys) || []);
  const gpWanted = [];
  gpStoresToLoad.forEach(s=> dates.forEach(d=>{
    const k = `grouppay:${s}:${d}`;
    if(gpExistingKeys.has(k)) gpWanted.push(k);
  }));
  let groupPayGrand = 0;
  await Promise.all(gpWanted.map(async k=>{
    try{
      const res = await window.storage.get(k, true);
      groupPayGrand += groupPayTotal(JSON.parse(res.value));
    }catch(e){}
  }));

  state.stats.data = {dates, dataByDate, catTotals, storeTotals, grand, storesToLoad, groupPayGrand};
  state.stats.loading = false;
  render();
}
function renderStats(main){
  if(state.stats.data===null && !state.stats.loading){ loadStatsData(); }
  main.innerHTML = `
    <div class="pillrow">
      <button class="pill ${state.stats.mode==='week'?'active':''}" data-mode="week">주간</button>
      <button class="pill ${state.stats.mode==='month'?'active':''}" data-mode="month">월별</button>
      <button class="pill ${state.stats.mode==='custom'?'active':''}" data-mode="custom">기간 선택</button>
    </div>
    ${state.user.role!=='manager' ? `
    <div class="pillrow" id="storeFilter">
      <button class="pill ${state.stats.store==='all'?'active':''}" data-store="all">전체 매장</button>
      ${STORES.map(s=>`<button class="pill ${state.stats.store===s?'active':''}" data-store="${escAttr(s)}">${esc(s)}</button>`).join('')}
    </div>` : ''}
    ${state.stats.mode==='custom' ? `
    <div class="datebar">
      <input type="date" id="stCustomStart" value="${state.stats.customStart}">
      <span class="label">~</span>
      <input type="date" id="stCustomEnd" value="${state.stats.customEnd}">
    </div>` : `
    <div class="datebar">
      <button class="nav" id="stPrev">‹</button>
      ${state.stats.mode==='week'
        ? `<input type="date" id="stPick" value="${state.stats.anchor}">`
        : `<input type="month" id="stPick" value="${state.stats.anchor.slice(0,7)}">`}
      <button class="nav" id="stNext">›</button>
    </div>`}
    <div id="statsBody"></div>
  `;
  main.querySelectorAll('[data-mode]').forEach(b=> b.onclick=()=>{ state.stats.mode=b.dataset.mode; state.stats.data=null; render(); });
  main.querySelectorAll('#storeFilter .pill').forEach(b=> b.onclick=()=>{ state.stats.store=b.dataset.store; state.stats.data=null; render(); });
  if(state.stats.mode==='custom'){
    document.getElementById('stCustomStart').onchange = (e)=>{
      state.stats.customStart = e.target.value; state.stats.data=null; render();
    };
    document.getElementById('stCustomEnd').onchange = (e)=>{
      state.stats.customEnd = e.target.value; state.stats.data=null; render();
    };
  } else {
    const stPick = document.getElementById('stPick');
    stPick.onchange = (e)=>{
      state.stats.anchor = state.stats.mode==='week' ? e.target.value : (e.target.value+'-01');
      state.stats.data=null; render();
    };
    document.getElementById('stPrev').onclick = ()=>{
      const step = state.stats.mode==='week' ? -7 : -30;
      const a = parseDate(state.stats.anchor);
      state.stats.anchor = todayStr(state.stats.mode==='week'? addDays(a,step) : new Date(a.getFullYear(),a.getMonth()-1,1));
      state.stats.data=null; render();
    };
    document.getElementById('stNext').onclick = ()=>{
      const a = parseDate(state.stats.anchor);
      state.stats.anchor = todayStr(state.stats.mode==='week'? addDays(a,7) : new Date(a.getFullYear(),a.getMonth()+1,1));
      state.stats.data=null; render();
    };
  }

  const body = document.getElementById('statsBody');
  const {label} = statsRange();
  if(state.stats.loading || state.stats.data===null){
    body.innerHTML = `<div class="loading">${esc(label)} 집계 중…</div>`;
    return;
  }
  const d = state.stats.data;
  const maxCat = Math.max(1, ...CAT_KEYS.map(k=>d.catTotals[k]));
  const maxStore = Math.max(1, ...d.storesToLoad.map(s=>d.storeTotals[s]));

  body.innerHTML = `
    <div class="stamp-total">
      <div class="cap">${esc(label)} 총 발주액</div>
      <div class="num mono">${fmtWon(d.grand)}원</div>
    </div>
    <div class="card">
      <div class="cardhead"><h2>단체 결제 합계</h2><div class="subtotal mono">${fmtWon(d.groupPayGrand||0)}원</div></div>
    </div>
    <div class="card">
      <div class="cardhead"><h2>카테고리별 합계</h2></div>
      ${CATS.map(c=>`
        <div class="statrow">
          <span class="lbl" style="color:${c.color}">${c.label}</span>
          <span class="val mono">${fmtWon(d.catTotals[c.key])}원</span>
        </div>
        <div class="barwrap"><div class="barfill" style="width:${(d.catTotals[c.key]/maxCat*100).toFixed(1)}%; background:${c.color}"></div></div>
      `).join('')}
    </div>
    <div class="card">
      <div class="cardhead"><h2>매장별 합계</h2></div>
      ${d.storesToLoad.map(s=>`
        <div class="statrow">
          <span class="lbl">${esc(s)}</span>
          <span class="val mono">${fmtWon(d.storeTotals[s])}원</span>
        </div>
        <div class="barwrap"><div class="barfill" style="width:${(d.storeTotals[s]/maxStore*100).toFixed(1)}%; background:var(--brand)"></div></div>
      `).join('')}
    </div>
    <div class="card">
      <div class="cardhead"><h2>일자별 추이</h2></div>
      <table class="report">
        <thead><tr><th>날짜</th>${d.storesToLoad.map(s=>`<th style="background:${TREND_STORE_BG[s]||''}">${esc(s)}</th>`).join('')}<th>합계</th></tr></thead>
        <tbody>
          ${d.dates.map(dt=>{
            const rowTotal = d.storesToLoad.reduce((sum,s)=> sum+(d.dataByDate[dt][s]||0), 0);
            return `<tr><td>${fmtDateLabel(dt)}</td>${d.storesToLoad.map(s=>`<td class="mono" style="background:${TREND_STORE_BG[s]||''}">${fmtWon(d.dataByDate[dt][s]||0)}</td>`).join('')}<td class="mono">${fmtWon(rowTotal)}</td></tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

// ---------- util ----------
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escAttr(s){ return esc(s); }

// ---------- 로그인 ----------
async function tryLogin(){
  const emailInput = document.getElementById('loginEmail');
  const pwInput = document.getElementById('loginPw');
  const err = document.getElementById('loginErr');
  err.textContent = '';
  try{
    await auth.signInWithEmailAndPassword(emailInput.value.trim(), pwInput.value);
  }catch(e){
    err.textContent = '이메일 또는 비밀번호가 올바르지 않습니다';
    pwInput.value = '';
    pwInput.focus();
  }
}
document.getElementById('loginSubmit').onclick = tryLogin;
document.getElementById('loginPw').addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });
document.getElementById('logoutBtn').onclick = ()=> auth.signOut();
document.getElementById('loginEmail').addEventListener('input', function(){
  if(this.value.endsWith('@')){
    const pos = this.value.length;
    this.value += 'amam.pick';
    this.setSelectionRange(pos, pos);
  }
});

function applyRoleRestrictions(){
  const dailyBtn = document.querySelector('nav.tabs button[data-tab="daily"]');
  const statsBtn = document.querySelector('nav.tabs button[data-tab="stats"]');
  const hideReports = state.user.role === 'staff';
  if(dailyBtn) dailyBtn.style.display = hideReports ? 'none' : '';
  if(statsBtn) statsBtn.style.display = hideReports ? 'none' : '';
  document.getElementById('userWho').textContent = `${state.user.email} (${state.user.role === 'owner' ? '사장님' : state.user.role === 'manager' ? state.user.store+' 점장' : '직원'})`;
  document.body.classList.toggle('money-hidden', !canViewMoney());
}
function visibleStores(){
  return state.user.role === 'manager' ? [state.user.store] : STORES;
}

// ---------- init ----------
document.querySelectorAll('nav.tabs button').forEach(b=>{
  b.onclick = ()=>{
    state.tab = b.dataset.tab;
    if(state.tab==='daily' || state.tab==='picklist') state.daily.data = null;
    if(state.tab==='stats') state.stats.data = null;
    render();
  };
});
auth.onAuthStateChanged(async (fbUser)=>{
  const lockScreen = document.getElementById('lockScreen');
  const app = document.getElementById('app');
  if(!fbUser){
    state.user = null;
    app.style.display = 'none';
    lockScreen.style.display = '';
    return;
  }
  let profile = null;
  try{
    const snap = await db.collection('users').doc(fbUser.email).get();
    if(snap.exists) profile = snap.data();
  }catch(e){}
  if(!profile){
    document.getElementById('loginErr').textContent = '권한이 설정되지 않은 계정입니다. 사장님에게 문의해주세요.';
    await auth.signOut();
    return;
  }
  const isFullAccess = FULL_ACCESS_OVERRIDE.includes(String(fbUser.email||'').trim().toLowerCase());
  state.user = {
    email: fbUser.email,
    role: isFullAccess ? 'owner' : String(profile.role||'').trim().toLowerCase(),
    store: String(profile.store||'').trim()
  };
  lockScreen.style.display = 'none';
  app.style.display = '';
  applyRoleRestrictions();
  state.catalog = await loadCatalog(state.entry.store);
  state.entry.order = await loadOrder(state.entry.store, state.entry.date);
  state.entry.orderMeta = await loadOrderMeta(state.entry.store, state.entry.date);
  state.entry.dirty = false;
  state.entry.closed = (await loadPickMeta(state.entry.date)).closed;
  state.entry.cookieAggregate = state.entry.store==='서소문점' ? await loadCookieAggregate(state.entry.date) : null;
  state.entry.groupPay = GROUP_PAY_STORES.includes(state.entry.store) ? await loadGroupPay(state.entry.store, state.entry.date) : [];
  state.entry.canTransfer = await loadCanTransfer(state.entry.date);
  render();
});
</script>
</body>
</html>
